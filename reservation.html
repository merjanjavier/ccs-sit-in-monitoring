<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="Profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>CCS Dashboard - Reservation</title>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="nav">
      <div class="logo">
        <p class="dashboard-text">Dashboard</p>
      </div>

      <div class="links">
        <a href="Profile.html">Home</a>
        <a href="Profile.html#editprofile">Edit Profile</a>
        <a href="summary.html">Sit-In Summary</a>
        <a href="sessions.html">Sessions</a>
        <a href="history.html">History</a>
        <a href="Leaderboard.html">Leaderboard</a>
        <a href="reservation.html" class="active">Reservation</a>
      </div>

      <div class="nav-actions">
        <div class="notification-container">
          <button id="notifBtn" class="notif-btn" title="Notifications">
            <i class="fa-solid fa-bell"></i>
            <span id="notifBadge" class="notif-badge" style="display: none;">0</span>
          </button>
          <div id="notifDropdown" class="notif-dropdown">
            <div class="notif-header">
              <h3>Notifications</h3>
              <button id="markAllReadBtn">Mark all as read</button>
            </div>
            <div id="notifList" class="notif-list">
              <div class="no-notif">No new notifications</div>
            </div>
          </div>
        </div>
        <button id="logoutBtn" class="logout-btn">Log Out</button>
      </div>
      
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="reservation-container">
        <div class="column-header">
          <h2>Make a Reservation</h2>
        </div>
        
        <div class="reservation-form-container">
          <form id="reservationForm">
            <div class="form-group">
              <label for="reservationLab">Select Lab</label>
              <select id="reservationLab" required>
                <option value="">Select Lab</option>
              </select>
            </div>

            <div class="form-group">
              <label>Software Available</label>
              <div id="reservationSoftware" class="software-display-field">Select a lab to see available software</div>
            </div>
            
            <div class="form-group">
              <label for="reservationDate">Reservation Date</label>
              <input type="date" id="reservationDate" required />
            </div>
            
            <div class="form-group">
              <label for="reservationPurpose">Purpose</label>
              <select id="reservationPurpose" required>
                <option value="">Select Purpose</option>
              </select>
            </div>

            <div class="form-group" id="pcSelectionGroup" style="display: none; margin-top: 20px;">
              <label style="font-weight: 600; margin-bottom: 10px; display: block;">Select PC (Optional)</label>
              <input type="hidden" id="selectedPcNumber">
              
              <div class="pc-legend" style="display: flex; gap: 15px; margin-bottom: 15px; align-items: center; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 6px;">
                  <span style="display: inline-block; width: 14px; height: 14px; background: #ecfdf5; border-radius: 4px; border: 1px solid #10b981;"></span>
                  <span style="font-size: 12px; color: #475569;">Available</span>
                </div>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <span style="display: inline-block; width: 14px; height: 14px; background: #fee2e2; border-radius: 4px; border: 1px solid #ef4444;"></span>
                  <span style="font-size: 12px; color: #475569;">Occupied</span>
                </div>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <span style="display: inline-block; width: 14px; height: 14px; background: #f1f5f9; border-radius: 4px; border: 1px solid #cbd5e1; opacity: 0.6;"></span>
                  <span style="font-size: 12px; color: #475569;">Disabled</span>
                </div>
                <div style="display: flex; align-items: center; gap: 6px;">
                  <span style="display: inline-block; width: 14px; height: 14px; background: #3b82f6; border-radius: 4px; border: 1px solid #2563eb; box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);"></span>
                  <span style="font-size: 12px; color: #475569; font-weight: bold;">Selected</span>
                </div>
              </div>

              <div id="reservationPcGrid" class="pc-selection-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; max-height: 250px; overflow-y: auto; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc;">
                <!-- 50 PCs rendered dynamically -->
              </div>
            </div>
            
            <div class="form-buttons">
              <button type="submit" class="save-btn">Submit Reservation</button>
            </div>
          </form>
        </div>
        
        <div class="column-header" style="margin-top: 40px;">
          <h2>Your Reservations</h2>
        </div>
        
        <div class="reservations-list" id="reservationsList">
          <div class="announcement-item">
            <div class="announcement-line">Loading reservations...</div>
          </div>
        </div>
      </div>
    </main>

    <script src="reservation.js"></script>
    <script src="nav-logic.js"></script>
  </body>
</html>
