<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="Profile.css" />
    <link rel="stylesheet" href="admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>CCS Dashboard - History</title>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="nav">
      <div class="logo">
        <p class="dashboard-text">Dashboard</p>
      </div>

      <div class="links">
        <a href="Profile.html">Home</a>
        <a href="Profile.html#editprofile">Edit Profile</a>
        <a href="summary.html">Sit-In Summary</a>
        <a href="sessions.html">Sessions</a>
        <a href="history.html" class="active">History</a>
        <a href="Leaderboard.html">Leaderboard</a>
        <a href="reservation.html">Reservation</a>
      </div>

      <div class="nav-actions">
        <div class="notification-container">
          <button id="notifBtn" class="notif-btn" title="Notifications">
            <i class="fa-solid fa-bell"></i>
            <span id="notifBadge" class="notif-badge" style="display: none;">0</span>
          </button>
          <div id="notifDropdown" class="notif-dropdown">
            <div class="notif-header">
              <h3>Notifications</h3>
              <button id="markAllReadBtn">Mark all as read</button>
            </div>
            <div id="notifList" class="notif-list">
              <div class="no-notif">No new notifications</div>
            </div>
          </div>
        </div>
        <button id="logoutBtn" class="logout-btn">Log Out</button>
      </div>
      
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="student-info-section">
        <div class="section-header section-header-center">
          <h2>History Information</h2>
        </div>
        
        <div class="student-info-content">
          <div class="student-table-controls">
            <div class="entries-control">
              <label>Show</label>
              <select id="historyEntriesSelect">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
              <label>Entries per page</label>
            </div>
            <div class="search-control">
              <label>Search:</label>
              <input type="text" id="historyTableSearch" placeholder="Search history..." />
            </div>
          </div>
          
          <div class="student-table-container">
            <table class="student-table">
              <thead>
                <tr>
                  <th>ID Number</th>
                  <th>Name</th>
                  <th>Purpose</th>
                  <th>Laboratory</th>
                  <th>Login</th>
                  <th>Logout</th>
                  <th>Date</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="historyTableBody">
                <!-- History records will be loaded here -->
              </tbody>
            </table>
          </div>
          
          <div class="table-footer">
            <div class="showing-entries" id="historyShowingEntries">
              Showing 0 to 0 of 0 entries
            </div>
            <div class="pagination">
              <button class="pagination-btn" onclick="goToFirstPage()">&laquo;&laquo;</button>
              <button class="pagination-btn" onclick="goToPrevPage()">&laquo;</button>
              <span class="pagination-page" id="historyCurrentPage">1</span>
              <button class="pagination-btn" onclick="goToNextPage()">&raquo;</button>
              <button class="pagination-btn" onclick="goToLastPage()">&raquo;&raquo;</button>
            </div>
          </div>
        </div>
        </div>
      </div>
    </main>

    <!-- Feedback Modal -->
    <div id="feedbackModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Submit Feedback</h2>
          <span class="close-btn" id="closeFeedbackModal">&times;</span>
        </div>
        <div class="modal-body">
          <form id="feedbackForm">
            <div class="form-group">
              <label for="feedbackRating">Rating</label>
              <select id="feedbackRating" required>
                <option value="">Select Rating</option>
                <option value="5">Excellent</option>
                <option value="4">Good</option>
                <option value="3">Average</option>
                <option value="2">Poor</option>
                <option value="1">Very Poor</option>
              </select>
            </div>
            <div class="form-group">
              <label for="feedbackComment">Comment</label>
              <textarea id="feedbackComment" rows="4" placeholder="Share your experience..."></textarea>
            </div>
            <div class="form-buttons">
              <button type="button" class="cancel-btn" id="cancelFeedbackBtn">Cancel</button>
              <button type="submit" class="save-btn">Submit Feedback</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="history.js"></script>
    <script src="nav-logic.js"></script>
  </body>
</html>
