<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="Profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <title>CCS Dashboard - Sit-In Summary</title>
  </head>
  <body>
    <!-- Navigation Bar -->
    <div class="nav">
      <div class="logo">
        <p class="dashboard-text">Dashboard</p>
      </div>

      <div class="links">
        <a href="Profile.html">Home</a>
        <a href="Profile.html#editprofile">Edit Profile</a>
        <a href="summary.html" class="active">Sit-In Summary</a>
        <a href="sessions.html">Sessions</a>
        <a href="history.html">History</a>
        <a href="Leaderboard.html">Leaderboard</a>
        <a href="reservation.html">Reservation</a>
      </div>

      <div class="nav-actions">
        <div class="notification-container">
          <button id="notifBtn" class="notif-btn" title="Notifications">
            <i class="fa-solid fa-bell"></i>
            <span id="notifBadge" class="notif-badge" style="display: none;">0</span>
          </button>
          <div id="notifDropdown" class="notif-dropdown">
            <div class="notif-header">
              <h3>Notifications</h3>
              <button id="markAllReadBtn">Mark all as read</button>
            </div>
            <div id="notifList" class="notif-list">
              <div class="no-notif">No new notifications</div>
            </div>
          </div>
        </div>
        <button id="logoutBtn" class="logout-btn">Log Out</button>
      </div>
      
      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="summary-container animate__animated animate__fadeIn">
        <div class="section-header">
          <h2>Sit-In Summary</h2>
        </div>
        
        <div class="summary-grid">
          <div class="summary-card total-hours">
            <div class="card-icon">
              <i class="fa-solid fa-clock"></i>
            </div>
            <div class="card-info">
              <span class="card-label">Total Sit-In Hours</span>
              <span class="card-value" id="totalHours">0.0</span>
            </div>
          </div>

          <div class="summary-card total-sessions">
            <div class="card-icon">
              <i class="fa-solid fa-calendar-check"></i>
            </div>
            <div class="card-info">
              <span class="card-label">Number of Sessions</span>
              <span class="card-value" id="totalSessions">0</span>
            </div>
          </div>

          <div class="summary-card avg-duration">
            <div class="card-icon">
              <i class="fa-solid fa-chart-line"></i>
            </div>
            <div class="card-info">
              <span class="card-label">Average Session Duration</span>
              <span class="card-value" id="avgDuration">0m</span>
            </div>
          </div>

          <div class="summary-card longest-session">
            <div class="card-icon">
              <i class="fa-solid fa-trophy"></i>
            </div>
            <div class="card-info">
              <span class="card-label">Longest Session</span>
              <span class="card-value" id="longestSession">0m</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="summary.js"></script>
    <script src="nav-logic.js"></script>
  </body>
</html>
